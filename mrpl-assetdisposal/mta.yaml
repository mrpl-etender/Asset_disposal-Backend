_schema-version: 3.3.0
ID: mrpl-assetdisposal
version: 1.0.0
description: "MRPL Asset Disposal Management"
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: mrpl-assetdisposal-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      readiness-health-check-type: http
      readiness-health-check-http-endpoint: /health
    build-parameters:
      builder: npm
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: mrpl-assetdisposal-db
      - name: mrpl-assetdisposal-auth
      - name: mrpl-assetdisposal-connectivity
      - name: mrpl-assetdisposal-destination
      # - name: mrpl-assetdisposal-logging

  - name: mrpl-assetdisposal-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: mrpl-assetdisposal-db

  # - name: mrpl-assetdisposal-app-deployer
  #   type: com.sap.application.content
  #   path: gen
  #   requires:

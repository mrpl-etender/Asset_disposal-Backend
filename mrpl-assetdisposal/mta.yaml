  #       parameters:
  #         content-target: true
  #   build-parameters:
  #     build-result: app/
  #     requires:

resources:
  - name: mrpl-assetdisposal-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: mrpl-assetdisposal-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: mrpl-assetdisposal
        tenant-mode: dedicated
  - name: mrpl-assetdisposal-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite
  - name: mrpl-assetdisposal-destination
    type: org.cloudfoundry.managed-service
    requires:
      - name: srv-api
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
